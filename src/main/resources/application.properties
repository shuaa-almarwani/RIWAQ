spring.application.name=Riwaq

#URL of the database
spring.datasource.url=jdbc:mysql://localhost:3306/riwaq

spring.datasource.username=root

spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
#2
spring.jpa.generate-ddl=true

spring.jpa.hibernate.ddl-auto=create-drop
#3:Find the error
Spring.web.error.include-message=always

Spring.web.error.include-stacktrace=always

openai.chatgpt.enabled=true
openai.api-key=${openai.api.key:}
openai.model=gpt-4.1-mini

notification.email.enabled=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


ultramsg.instance-id=${ULTRAMSG_INSTANCE_ID:}
ultramsg.token=${ULTRAMSG_TOKEN:}

